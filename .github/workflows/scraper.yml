name: Hourly Auto Scraper

on:
  schedule:
    - cron: "0 * * * *"  # 每小時整點執行一次
  workflow_dispatch:      # 支援手動觸發

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 取得主程式碼 (main 分支)
        uses: actions/checkout@v4

      - name: 2. 取得舊資料 (為了保留舊 UUID)
        # 去 gh-pages 分支把上一小時的最終成果抓下來，讓 Python 可以比對並鎖定 UUID
        run: |
          git clone --branch gh-pages "https://github.com/${{ github.repository }}.git" gh-pages-data || echo "gh-pages 分支還不存在，略過"
          if [ -d "gh-pages-data/final_results" ]; then
            cp -r gh-pages-data/final_results ./
          fi

      - name: 3. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 4. 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 google-generativeai

      - name: 5. 執行整合主程式 (包含爬蟲與 AI 摘要)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python main.py

      - name: 6. 部署整個專案與成果至 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .            # 核心變更：將整個專案目錄（含程式、暫存與成果資料夾）全部推入分支
          keep_files: false         # 每次都以最新狀態覆蓋，保持分支乾淨不殘留舊垃圾
          commit_message: "Auto-update: Sync full project and newly scraped results"
