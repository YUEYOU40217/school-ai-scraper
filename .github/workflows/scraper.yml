name: Hourly Auto Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 取得主程式碼 (main 分支)
        uses: actions/checkout@v4

      - name: 2. 取得舊資料 (為了保留舊 UUID 與歷史資料)
        run: |
          git clone --branch gh-pages "[https://github.com/$](https://github.com/$){{ github.repository }}.git" gh-pages-data || echo "gh-pages 分支還不存在，略過"
          if [ -d "gh-pages-data/final_results" ]; then
            cp -r gh-pages-data/final_results ./
          fi

      - name: 3. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 4. 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 5. 執行整合主程式 (包含爬蟲與 AI 摘要)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python main.py

      - name: 6. 集中打包發佈資料 (建立 .nojekyll 確保 GitHub Pages 正常運作)
        run: |
          mkdir -p deploy_dir
          cp -r crawler_pages deploy_dir/ || true
          cp -r final_results deploy_dir/ || true
          cp README.md deploy_dir/ || true

      - name: 7. 部署純資料至 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./deploy_dir  
          keep_files: false          
          commit_message: "Auto-update: Sync newly scraped results"
