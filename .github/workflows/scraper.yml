name: Hourly Auto Scraper

on:
  schedule:
    - cron: "0 * * * *"  # 每小時整點執行一次
  workflow_dispatch:      # 支援手動觸發

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 取得主程式碼 (main 分支)
        uses: actions/checkout@v4

      - name: 2. 取得舊資料 (為了保留舊 UUID)
        run: |
          git clone --branch gh-pages "https://github.com/${{ github.repository }}.git" gh-pages-data || echo "gh-pages 分支還不存在，略過"
          if [ -d "gh-pages-data/final_results" ]; then
            cp -r gh-pages-data/final_results ./
          fi

      - name: 3. 設定 Python 環境 (升級至 3.11 消除過期警告)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 4. 安裝依賴套件 (改用官方新版 google-genai)
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 google-genai

      - name: 5. 執行整合主程式 (包含爬蟲與 AI 摘要)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python main.py

      - name: 6. 部署整個專案與成果至 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          keep_files: false
          commit_message: "Auto-update: Sync full project and newly scraped results with new Gemini SDK"
