name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 時間 0 點（台灣時間早上 8 點）自動執行一次
  workflow_dispatch:     # 允許手動觸發

permissions:
  actions: write         # 必須要有 write 權限才能刪除執行紀錄
  contents: read

jobs:
  del_runs:
    runs-on: ubuntu-latest
    steps:
      - name: 刪除三天前的舊 Workflow 執行紀錄 (一般任務)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3            # 修改為保留 3 天
          keep_minimum_runs: 3      # 最少保留 3 次 (避免三天內都沒跑被清空)

      - name: 清理「清理紀錄」本身的執行紀錄 (只留當下最新一次)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0            # 設為 0 天
          keep_minimum_runs: 0      # 設為 0 次 (套件會自動避開正在執行的這一次，因此實際上會剛好留下 1 次)
          delete_workflow_pattern: "Cleanup Old Workflow Runs" # 指定只針對這個 Workflow 進行清理
