name: Auto Playwright Scraper

on:
  # 允許你隨時在 GitHub 網頁上按按鈕手動執行
  workflow_dispatch: 
  
  # 設定排程自動執行 (目前設定為每天 UTC 時間 00:00 執行，台灣時間為早上 08:00)
  schedule:
    - cron: '0 0 * * *' 

jobs:
  run-scraper:
    # GitHub 提供的一台免費沒有螢幕的 Linux 伺服器
    runs-on: ubuntu-latest

    steps:
      # 1. 把你放在 GitHub 上的程式碼抓到這台伺服器裡
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 安裝 Python 環境 (指定使用 3.10 版本)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安裝 requirements.txt 裡的套件，以及 Playwright 需要的瀏覽器核心
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          playwright install chromium

      # 4. 執行你的爬蟲主程式！ (請確認你的主程式檔名是 main.py，若不同請自行修改)
      - name: Run scraper script
        run: |
          python main.py
        # 如果你的專案有用到 API Key (例如 Gemini API)，請把下面的註解拿掉並設定 Secrets
        # env:
        #   GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 5. 最重要的一步：把爬蟲抓下來存檔的 JSON 或 CSV 重新 Commit 並 Push 回 GitHub
      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 自動更新爬蟲資料" || echo "今天沒有新資料，無需更新"
          git push
