name: Run Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    # 【重要】給予寫入權限，否則 GitHub Actions 無法 push 到 gh-pages 分支
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch old data from gh-pages
        run: |
          git fetch origin gh-pages || true
          # 由於現在是產出多個 jsonl 檔案，這步只需 fetch 分支即可，不需要單獨 pull 舊檔案

      - name: Run python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scraper.py

      - name: Commit and Push to gh-pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 建立暫存資料夾，把所有產出的 jsonl 與備份檔複製過去
          mkdir -p /tmp/scraper_data
          cp *.jsonl /tmp/scraper_data/ || true
          cp raw_crawled_data.json /tmp/scraper_data/ || true
          
          # 2. 清除工作區的變更，準備切換分支 (避免未 commit 檔案阻擋 checkout)
          git checkout -- . || true
          
          # 3. 切換到 gh-pages 分支 (如果沒有這個分支就自動建立一個)
          git checkout gh-pages || git checkout -b gh-pages
          
          # 4. 把剛剛暫存的新資料蓋過來工作區
          cp /tmp/scraper_data/*.jsonl ./ || true
          cp /tmp/scraper_data/raw_crawled_data.json ./ || true
          
          # 5. 加入追蹤並 Push
          git add *.jsonl raw_crawled_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: sync data to gh-pages" && git push origin gh-pages)
