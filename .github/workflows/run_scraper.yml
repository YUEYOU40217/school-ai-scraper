name: AI Scraper
on:
  schedule:
    - cron: '0 * * * *'  # 關鍵修改：每小時的 0 分執行一次
  workflow_dispatch:     # 讓你依然可以手動點擊 Run

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run scraper
        run: python scraper.py
