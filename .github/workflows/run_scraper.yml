name: Auto Web Scraper

# 設定觸發時機
on:
  schedule:
    # 每天 UTC 時間 0 點 (台灣時間早上 8 點) 自動執行一次
    - cron: '0 * * * *'
  # 允許你在 GitHub 網頁上手動點擊執行按鈕
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 取得專案原始碼
      - name: 取得程式碼
        uses: actions/checkout@v3

      # 2. 設定 Python 環境
      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 建議使用 3.10 以上版本以支援較新的非同步功能

      # 3. 安裝你指定的相依套件
      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml google-genai playwright DrissionPage
          
          # 安裝 Playwright/DrissionPage 在 Ubuntu 環境下所需的底層瀏覽器與系統相依套件
          playwright install-deps
          playwright install chromium

      # 4. 執行你的爬蟲主程式
      - name: 執行爬蟲腳本
        env:
          # 將 GitHub Secrets 注入為環境變數，供 scraper.py 讀取
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          # 如果你的 Google GenAI 需要 API Key 才能運作，請一併加入
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python scraper.py

      # 5. 將爬取後的結果部署到 gh-pages 分支
      - name: 部署至 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # 使用 GitHub 內建的 Token 進行驗證，不需要手動設定
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 指定要推送到 gh-pages 的資料夾，'./' 代表推測整個專案目錄 (包含新產生的 json)
          publish_dir: ./
          # 指定目標分支，套件發現分支不存在時會自動建立
          publish_branch: gh-pages
          # 自動 commit 的訊息
          commit_message: "Auto update announcements data"
