name: AI Scraper
on:
  schedule:
    - cron: '0 * * * *'  # 每小時的 0 分執行一次
  workflow_dispatch:     # 允許手動點擊 Run

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      # 修正後的自動存檔步驟
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add announcements.json  # 關鍵：強制叫 Git 去盯緊這個檔案
          git commit -m "Auto-update announcements by Gemini Flash-Lite" || echo "沒有新公告需要更新"
          git push
