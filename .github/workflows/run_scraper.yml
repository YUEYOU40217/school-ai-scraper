name: AI Scraper
on:
  schedule:
    - cron: '0 * * * *'  # 每小時的 0 分執行一次
  workflow_dispatch:     # 允許手動點擊 Run

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # 將保險箱的 Key 帶入環境變數
        run: python scraper.py
