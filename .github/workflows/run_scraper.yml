name: Run Scraper

on:
  schedule:
    # 台灣時間 10:37, 18:37, 02:37 發車（一天三次，避免被 GitHub 降等排隊）
    - cron: '37 2,10,18 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      # 1. 抓取主分支的程式碼（scraper.py 等）
      - name: Checkout main branch
        uses: actions/checkout@v4

      # 2. 設定 Python 環境與快取
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      # 3. 安裝套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 執行爬蟲，產出最新的 announcements.json
      - name: Run python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      # 5. 跨分支搬運：把 JSON 塞進 gh-pages 分支並推送
      - name: Commit and Push to gh-pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 先把剛剛辛苦抓好的 json 複製到系統暫存區
          cp announcements.json /tmp/announcements.json
          
          # 切換到遠端的 gh-pages 分支
          git fetch origin gh-pages
          git checkout gh-pages
          
          # 把最新的 json 覆蓋回來 gh-pages 分支
          cp /tmp/announcements.json announcements.json
          
          # 提交並推回 gh-pages
          git add announcements.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: sync data to gh-pages" && git push origin gh-pages)
